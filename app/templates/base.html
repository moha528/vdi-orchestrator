<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}VDI Orchestrator{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --surface:#111827; --surface-2:#0f172a; --border:#1e293b;
  --text:#e2e8f0; --text-dim:#94a3b8; --text-mute:#64748b;
  --accent:#3b82f6; --accent-hover:#2563eb;
  --success:#22c55e; --danger:#ef4444; --warning:#f59e0b;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-hover)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header .brand{font-weight:700;font-size:16px;letter-spacing:.3px}
header .brand span{color:var(--accent)}
header nav{display:flex;gap:18px;align-items:center}
header nav a{color:var(--text-dim);font-weight:500}
header nav a.active,header nav a:hover{color:var(--text)}
header .user-info{color:var(--text-dim);font-size:13px;display:flex;align-items:center;gap:12px}
header .user-info .badge{background:var(--surface-2);border:1px solid var(--border);padding:2px 8px;border-radius:6px;font-size:11px;color:var(--accent)}
main{max-width:1280px;margin:0 auto;padding:32px 28px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
h2{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
.subtitle{color:var(--text-dim);margin-bottom:28px;font-size:13px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.card:hover{border-color:#2a3a52;box-shadow:0 0 0 1px rgba(59,130,246,.15),0 8px 24px rgba(0,0,0,.3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;transition:all .15s;border:1px solid transparent}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-success{background:var(--success);color:#052e16}
.btn-success:hover{background:#16a34a;color:#fff}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--text-dim);border-color:var(--border)}
.btn-ghost:hover{color:var(--text);border-color:#334155}
.btn:disabled{opacity:.5;cursor:not-allowed}
.badge-status{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge-ready{background:rgba(34,197,94,.12);color:var(--success);border:1px solid rgba(34,197,94,.3)}
.badge-creating{background:rgba(245,158,11,.12);color:var(--warning);border:1px solid rgba(245,158,11,.3)}
.badge-error{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.badge-destroying{background:rgba(100,116,139,.15);color:var(--text-dim);border:1px solid var(--border)}
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;color:var(--text-dim);font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text-dim);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
td{color:var(--text)}
tr:hover td{background:var(--surface-2)}
input,select,textarea{width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:13px;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
label{display:block;color:var(--text-dim);font-size:12px;font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.form-row{margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.progress-steps{display:flex;gap:6px;margin-top:12px}
.progress-steps .step{flex:1;height:4px;background:var(--border);border-radius:2px;transition:background .3s}
.progress-steps .step.active{background:var(--accent)}
.progress-steps .step.done{background:var(--success)}
.empty{text-align:center;padding:40px;color:var(--text-mute);font-style:italic}
.flex{display:flex;gap:10px;align-items:center}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mt-4{margin-top:16px} .mt-6{margin-top:24px} .mt-8{margin-top:32px}
.mb-4{margin-bottom:16px}
.text-dim{color:var(--text-dim)}
.text-mute{color:var(--text-mute);font-size:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:560px;width:92%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stat .value{font-size:26px;font-weight:700;color:var(--accent);margin-top:4px}
.stat .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.3px}
@media (max-width:640px){
  header{padding:12px 16px;flex-wrap:wrap;gap:10px}
  main{padding:20px 16px}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
{% if user %}
<header>
  <div class="brand">VDI<span> Orchestrator</span></div>
  <nav>
    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Mes desktops</a>
    {% if user.is_admin %}
    <a href="/admin" class="{% if request.url.path.startswith('/admin') %}active{% endif %}">Administration</a>
    {% endif %}
  </nav>
  <div class="user-info">
    <span>{{ user.username }}</span>
    {% if user.is_admin %}<span class="badge">ADMIN</span>{% endif %}
    <a href="/logout" class="btn btn-ghost" style="padding:6px 12px">Déconnexion</a>
  </div>
</header>
{% endif %}
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
