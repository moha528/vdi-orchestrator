services:
  guacd:
    image: guacamole/guacd:1.6.0
    container_name: guacd
    restart: unless-stopped

  guac-db:
    image: postgres:15-alpine
    container_name: guac-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: GuacDB_S3cur3_2025
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - guac-db-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guacamole_user -d guacamole_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  guacamole:
    image: guacamole/guacamole:1.6.0
    container_name: guacamole
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      POSTGRESQL_HOSTNAME: guac-db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USER: guacamole_user
      POSTGRESQL_PASSWORD: GuacDB_S3cur3_2025
    volumes:
      - ./guac-extensions/guacamole-auth-json-1.6.0.jar:/etc/guacamole/extensions/guacamole-auth-json-1.6.0.jar:ro
      - ./guac-config/guacamole.properties:/etc/guacamole/guacamole.properties:ro
    depends_on:
      guac-db:
        condition: service_healthy
      guacd:
        condition: service_started

  # ─── VDI Orchestrator (NOUVEAU) ───────────────────
  vdi-orchestrator:
    build: ./app
    container_name: vdi-orchestrator
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ── Proxmox ──
      PROXMOX_HOST: 192.168.80.10
      PROXMOX_PORT: 8006
      PROXMOX_USER: root@pam
      PROXMOX_PASSWORD: ${PROXMOX_PASSWORD}
      PROXMOX_NODE: proxmox
      # ── Guacamole DB ──
      GUAC_DB_HOST: guac-db
      GUAC_DB_PORT: 5432
      GUAC_DB_NAME: guacamole_db
      GUAC_DB_USER: guacamole_user
      GUAC_DB_PASSWORD: GuacDB_S3cur3_2025
      GUAC_URL: http://192.168.80.10:8080/guacamole
      GUAC_JSON_SECRET: ${GUAC_JSON_SECRET}
      # ── Clone Pool ──
      CLONE_POOL_START_ID: 500
      CLONE_POOL_END_ID: 550
      CLONE_NAME_PREFIX: "vdi-"
      POLL_INTERVAL: 3
      POLL_TIMEOUT: 120
      BACKUP_ENABLED: "true"
      BACKUP_MAX_SIZE_MB: 500
      BACKUP_VM_USER: etudiant
    volumes:
      - vdi-backups:/srv/backups
    depends_on:
      guac-db:
        condition: service_healthy

volumes:
  guac-db-data:
  vdi-backups:
